appId: com.vcoeur.condash
productName: condash
copyright: "MIT — Alice Voland"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

asar: true

# Auto-update channel: latest*.yml is uploaded next to the bundles in the
# GitHub Release tied to the current `v*` tag. App reads it at runtime via
# electron-updater.
#
# `releaseType: prerelease` tells electron-builder to look for (and, if
# missing, create) a prerelease for the tag. Drafts are invisible to the
# `releases/tags/:tag` API endpoint electron-builder uses to find the
# release, so a pre-created draft would be missed and electron-builder
# would create a duplicate — see release.yml for the long version.
publish:
  provider: github
  owner: vcoeur
  repo: condash
  releaseType: prerelease

linux:
  target:
    - AppImage
    - deb
  category: Development

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  # No code-signing cert: ship unsigned. End users dismiss the Gatekeeper
  # warning. macOS notarization also disabled — both gated on cert posture.
  identity: null

win:
  target:
    - nsis
  # No code-signing cert. SmartScreen will warn on first install; users
  # click "More info" → "Run anyway".
