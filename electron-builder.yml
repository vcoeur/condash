appId: com.vcoeur.condash-electron
productName: condash
copyright: "MIT — Alice Voland"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

asar: true

linux:
  target:
    - AppImage
    - deb
  category: Development

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

win:
  target:
    - nsis
