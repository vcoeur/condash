appId: com.vcoeur.condash
productName: condash
copyright: "MIT — Alice Voland"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - dist-cli/**/*
  - docs/**/*
  - conception-template/**/*
  - package.json

asar: true

# Unpack the CLI bundle + the conception template so the bash wrapper can
# `exec` them via plain Node (ELECTRON_RUN_AS_NODE=1). Files inside the
# asar archive are only readable through Electron's wrapped fs; plain Node
# can't open them. Unpacking is per-file — the rest of the app stays inside
# app.asar. The CLI's `__dirname`-based lookup (skills install reads
# conception-template/.claude/skills/ relative to dist-cli/condash.cjs) only
# resolves correctly when both directories are unpacked together.
asarUnpack:
  - dist-cli/**/*
  - conception-template/**/*

# Per-platform launcher wiring. See build/after-pack.cjs for the full why.
# Linux only: wrap the Electron binary with a bash launcher that exports
# ELECTRON_OZONE_PLATFORM_HINT=wayland on Wayland sessions before
# Chromium's C++ early-init reads it (otherwise the AppImage falls back
# to XWayland and renders blurry on fractional-scaled monitors). The same
# wrapper also dispatches `condash <subcommand>` → CLI (re-execs the
# Electron binary as plain Node against dist-cli/condash.cjs).
afterPack: build/after-pack.cjs

# Publish: every tag pushes installers (and electron-builder's metadata
# files latest*.yml / *.blockmap) into the GitHub Release for the tag.
# Auto-update is disabled at runtime — see src/main/index.ts:312 — but
# the metadata files are still emitted as a no-op side-effect.
#
# `releaseType: prerelease` tells electron-builder to look for (and, if
# missing, create) a prerelease for the tag. Drafts are invisible to the
# `releases/tags/:tag` API endpoint electron-builder uses to find the
# release, so a pre-created draft would be missed and electron-builder
# would create a duplicate — see release.yml for the long version.
publish:
  provider: github
  owner: vcoeur
  repo: condash
  releaseType: prerelease

linux:
  target:
    - AppImage
    - deb
  category: Development
  # PNG ladder generated from build/icon.svg (H3 family mark — rose-tinted
  # cream tile, dark C, pink heart watermark; mirrors the vcoeur.com mark to
  # signal "workspace dashboard" pairing). Without this, electron-builder
  # ships its default placeholder, so the .deb / AppImage launcher and the
  # running window's task-switcher entry show the generic Electron diamond.
  icon: build/icons

# Override the stock deb postinst. The default template only sets SUID on
# /opt/<app>/chrome-sandbox when `unshare --user true` fails — which on
# Ubuntu 23.10+ is the wrong signal: the kernel feature is on (unshare
# succeeds) but AppArmor's apparmor_restrict_unprivileged_userns=1 blocks
# Chromium's userns sandbox, leaving it with no working sandbox path and
# aborting at startup. Our script always chmod 4755 chrome-sandbox so the
# SUID-sandbox fallback is available regardless.
deb:
  afterInstall: build/linux-after-install.sh

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  # No code-signing cert: ship unsigned. End users dismiss the Gatekeeper
  # warning. macOS notarization also disabled — both gated on cert posture.
  identity: null

win:
  target:
    - nsis
  # No code-signing cert. SmartScreen will warn on first install; users
  # click "More info" → "Run anyway".

# build/installer.nsh appends $INSTDIR to per-user PATH on install (and
# strips it on uninstall) so `condash` is reachable from any shell,
# matching the Linux postinst's /usr/bin/condash symlink.
# electron-builder picks build/installer.nsh up by default; the explicit
# `include:` is here so the wiring isn't load-bearing on a default-
# discovery convention. See GitHub issue #119.
nsis:
  include: build/installer.nsh
