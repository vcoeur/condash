name: _fast

# Reusable fast lane: format-check + typecheck + build + vitest. Target
# ≤ 90 s wall-clock. Called by ci.yml (every PR + every push to main) and
# by release.yml (first stage of the real gate at tag time). Never
# publishes anything.

on:
  workflow_call:

jobs:
  fast:
    name: Fast checks (typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # No `cache: 'npm'`: the node_modules cache below already restores the full
      # install on a hit (npm ci is then skipped), so setup-node's npm cache only
      # helped rare lockfile-change runs — while its save post-step's transient
      # cache-service timeouts can fail a release-tag run and skip publish.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # Cache node_modules + the electron/electron-builder caches. On a
      # hit we skip npm ci entirely — the `electron-rebuild` postinstall
      # output for node-pty is part of node_modules and is restored too,
      # so we don't pay the ~20-40 s native rebuild on warm runs.
      - name: Cache node_modules + electron caches
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
          key: deps-ubuntu-${{ hashFiles('package-lock.json') }}-electron-33

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Format check
        run: make format-check

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build

      - name: Vitest unit suite
        run: npx vitest run

      # Dead-code / over-export guard (knip). Fails on dead files, dead /
      # unlisted / unresolved deps, and duplicate exports; the pre-existing
      # unused-export backlog is graded `warn` in knip.json and does not fail.
      - name: Dead-code check
        run: npx knip
