name: _playwright

# Reusable Electron Playwright lane (Ubuntu + xvfb). Called only by
# release.yml (second stage of the real gate at tag time). Never publishes
# anything.

on:
  workflow_call:

jobs:
  playwright:
    name: Playwright suite
    runs-on: ubuntu-latest
    # The settings-modal-audit spec alone runs ~2.5 min locally and stages
    # ~70 fields through the Save round-trip; CI runners are slower. Give
    # generous headroom over the suite's own per-test timeouts so a single
    # pass never brushes the job limit (a brush would otherwise trigger the
    # config's CI retries and stack runtime 3×).
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # No `cache: 'npm'`: the node_modules cache below already restores the full
      # install on a hit (npm ci is then skipped), so setup-node's npm cache only
      # helped rare lockfile-change runs — while its save post-step's transient
      # cache-service timeouts can fail a release-tag run and skip publish.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache node_modules + electron caches
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
          key: deps-ubuntu-${{ hashFiles('package-lock.json') }}-electron-33

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install xvfb
        # Electron Playwright needs a display server on Linux. xvfb-run -a
        # wraps the suite so each invocation gets an isolated virtual
        # display.
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build renderer + main
        run: npm run build

      - name: Run Playwright suite
        run: xvfb-run -a npm test -- --reporter=list

      - name: Upload Playwright artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-artefacts
          path: |
            test-results/
            tests/screenshots-out/
          if-no-files-found: ignore
