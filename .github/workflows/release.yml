name: release

# Real gate + publish on version tags.
# Runs the full suite (fast -> playwright -> build) sequentially on the
# exact commit being tagged, then creates/updates the GitHub Release and
# uploads assets. No stamp mechanism, no commit-status reading.

on:
  push:
    tags:
      - 'v*'

permissions:
  # publish creates the GH Release + uploads assets (contents:write).
  contents: write

jobs:
  validate-tag:
    name: Validate tag (shape + reachable-from-main)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for ancestry check)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # No pushes from this job. The later `git fetch origin main` works
          # anonymously (public repo); restore credentials here if the repo
          # ever goes private.
          persist-credentials: false

      # Reject malformed tags. Stable `vX.Y.Z` and prerelease suffixes
      # (`-rc.N`, `-alpha*`, `-beta*`) both need the leading semver triplet.
      - name: Validate tag shape
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid vX.Y.Z[-suffix] release tag." >&2
            exit 1
          fi
          echo "Tag $TAG is valid."

      # Tags must point at commits that have landed on main -- no one-off
      # feature-branch tags, no detached commits.
      - name: Assert tag SHA is reachable from origin/main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          TAG_SHA=$(git rev-parse "$TAG^{commit}")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag $TAG ($TAG_SHA) is not reachable from origin/main." >&2
            echo "Tags must point at commits that have landed on main." >&2
            exit 1
          fi
          echo "Tag $TAG ($TAG_SHA) is reachable from origin/main."

  fast:
    needs: validate-tag
    uses: ./.github/workflows/_fast.yml

  playwright:
    needs: fast
    uses: ./.github/workflows/_playwright.yml

  build:
    needs: playwright
    uses: ./.github/workflows/_build.yml

  publish:
    name: Publish to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-staging
          # merge-multiple flattens installers-<os>/ into one directory so
          # the upload glob is a single flat dir.
          merge-multiple: true

      - name: List staged release files
        run: ls -la release-staging/

      - name: Create or reuse release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `vX.Y.Z-rc.N` / `-alpha*` / `-beta*` ship as prereleases (not
          # surfaced as `latest`). Plain `vX.Y.Z` ships as latest.
          if [[ "$TAG" == *-rc.* || "$TAG" == *-alpha* || "$TAG" == *-beta* ]]; then
            IS_PRE=true
            MAKE_LATEST=false
            echo "Tag $TAG matches prerelease pattern; publishing as prerelease."
          else
            IS_PRE=false
            MAKE_LATEST=true
            echo "Tag $TAG is a stable tag; publishing as latest release."
          fi
          if REL_ID=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id 2>/dev/null); then
            gh api -X PATCH "repos/$GH_REPO/releases/$REL_ID" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST >/dev/null
            echo "Release for $TAG already exists ($REL_ID); state re-asserted, uploading into it."
          else
            BODY=$'Unsigned Electron build of condash.\n\nInstall bypass per OS:\n- Windows: SmartScreen -> "More info" -> "Run anyway".\n- macOS: System Settings -> Privacy & Security -> "Open Anyway".\n- Linux: `chmod +x` the AppImage, run.'
            gh api -X POST "repos/$GH_REPO/releases" \
              -f tag_name="$TAG" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST \
              -f name="condash $TAG" \
              -f body="$BODY" \
              --jq '"Created release " + (.id|tostring) + " for " + .tag_name'
          fi

      # Single uploader, no race. `--clobber` so a re-run replaces existing
      # assets cleanly without 422'ing on duplicate filenames.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-staging/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No assets staged -- nothing to upload" >&2
            exit 1
          fi
          gh release upload "$TAG" --repo "$GH_REPO" --clobber "${assets[@]}"
