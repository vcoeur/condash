name: release

# Build unsigned cross-platform installers + publish them (and the
# `latest*.yml` channel files electron-updater needs) to a single
# GitHub Release tied to the pushed `v*` tag.
#
# Triggered by tags only — `git push origin v2.0.0`. The workflow does NOT
# create the tag itself; humans cut the tag locally with `git tag -a vX`
# after a clean main and push it.
#
# Why this isn't matrix-publishes-directly: GitHub's API is inconsistent
# between the by-tag lookup, the by-id lookup, and the list endpoint
# (verified live: a freshly-created prerelease was findable by id/tag but
# absent from /releases?per_page=100 for several minutes). electron-builder's
# release lookup loses the race against this lag — it doesn't find the
# pre-existing release and tries to create its own, fragmenting assets
# across N drafts/prereleases per matrix job.
#
# Bulletproof pattern: each matrix job builds locally with `--publish
# never`, uploads its `release/` directory as a workflow artifact, and a
# final `publish` job downloads all of them and runs a single `gh release
# upload` against one release. Only one process ever talks to the GH
# Release API.

on:
  push:
    tags:
      - 'v*'

permissions:
  # contents:write is required for the publish job to create the GH
  # Release and upload assets via the workflow's GITHUB_TOKEN.
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      # `--publish never` builds the installers and emits the matching
      # `latest*.yml` channel file under `release/` without touching the
      # GH Release API. Upload happens in the `publish` job below.
      - name: Build installers
        run: npx electron-builder --publish never

      # Patch the AppImage's AppRun launcher to exec Electron with
      # `--no-sandbox`. Without this the AppImage aborts on launch with
      # "SUID sandbox helper binary was found, but is not configured
      # correctly" because AppImage extracts to /tmp/.mount_*/, which
      # most distros mount `nosuid` — so chrome-sandbox loses its SUID
      # bit. `app.commandLine.appendSwitch('no-sandbox')` from main.ts
      # was tried first and verified to ship in the asar, but Chromium
      # reads its sandbox config too early in init for the JS-level
      # switch to take effect. The .deb path keeps the sandbox: it
      # installs chrome-sandbox at /opt/condash/ where the SUID bit is
      # honoured, so this patch only touches the AppImage.
      # appimagetool 1.9.0 calls `desktop-file-validate` on the bundle
      # contents during repack and aborts if it's missing. Not on the
      # default ubuntu-latest image.
      - name: Install desktop-file-utils (for appimagetool repack)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils

      - name: Inject --no-sandbox into AppImage AppRun
        if: matrix.os == 'ubuntu-latest'
        env:
          # Pinned appimagetool release — moving off `continuous` so a
          # silent upstream change doesn't break release day.
          APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=(release/condash-*.AppImage)
          shopt -u nullglob
          if [[ ${#matches[@]} -eq 0 ]]; then
            echo "No AppImage found to patch" >&2
            exit 1
          fi
          APPIMAGE="${matches[0]}"
          echo "Patching $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/original.AppImage"
          chmod +x "$WORK/original.AppImage"
          ( cd "$WORK" && ./original.AppImage --appimage-extract >/dev/null )

          # Rewrite the two `exec "$BIN" …` lines in AppRun's atexit
          # function to insert --no-sandbox before forwarded args.
          # Using a Python rewrite (rather than sed) so the substitution
          # is exact and can be re-asserted in the verify step below.
          # Lines are indented 6 spaces in electron-builder's stock
          # AppRun template; the literal whitespace must match.
          python3 - "$WORK/squashfs-root/AppRun" <<'PY'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          src = p.read_text()
          replacements = [
              ('      exec "$BIN"\n',              '      exec "$BIN" --no-sandbox\n'),
              ('      exec "$BIN" "${args[@]}"\n', '      exec "$BIN" --no-sandbox "${args[@]}"\n'),
          ]
          for old, new in replacements:
              if old not in src:
                  raise SystemExit(f"AppRun does not contain expected line: {old!r}")
              src = src.replace(old, new)
          p.write_text(src)
          print("AppRun patched.")
          PY

          # Repack with a pinned appimagetool release. Run it via
          # --appimage-extract-and-run so the runner doesn't need
          # fuse / libfuse2.
          curl -sSL -o "$WORK/appimagetool" "$APPIMAGETOOL_URL"
          chmod +x "$WORK/appimagetool"
          ARCH=x86_64 "$WORK/appimagetool" --appimage-extract-and-run \
              "$WORK/squashfs-root" "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Verify: extract the repacked AppImage and confirm AppRun
          # exec lines now carry --no-sandbox.
          VERIFY=$(mktemp -d)
          cp "$APPIMAGE" "$VERIFY/out.AppImage"
          chmod +x "$VERIFY/out.AppImage"
          ( cd "$VERIFY" && ./out.AppImage --appimage-extract >/dev/null )
          if ! grep -q 'exec "\$BIN" --no-sandbox' "$VERIFY/squashfs-root/AppRun"; then
              echo "Patch verification failed — repacked AppRun missing --no-sandbox" >&2
              exit 1
          fi
          echo "AppImage AppRun patch verified."

      # Capture only the installer bundles + channel files. Skip the
      # `linux-unpacked/`, `mac/`, `win-unpacked/` working directories,
      # the `builder-debug.yml`, and the `.blockmap` artifacts ship as
      # standalone files (no skip needed). `if-no-files-found: error` so
      # an empty release dir fails the matrix job loudly instead of
      # silently producing an empty publish.
      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-staging
          # Without merge-multiple, each matrix's artifact lands under
          # release-staging/installers-<os>/. With it, they all merge
          # into release-staging/. We use merge-multiple so the upload
          # glob is one flat directory.
          merge-multiple: true

      - name: List staged release files
        run: ls -la release-staging/

      - name: Create or reuse release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Tag-driven prerelease decision: `vX.Y.Z-rc.N`, `-alpha*`, and
          # `-beta*` ship as GitHub prereleases (not surfaced as `latest`
          # by the API). Plain `vX.Y.Z` ships as a stable release marked
          # latest, so docs sites + clients calling /releases/latest see
          # it immediately.
          if [[ "$TAG" == *-rc.* || "$TAG" == *-alpha* || "$TAG" == *-beta* ]]; then
            IS_PRE=true
            MAKE_LATEST=false
            echo "Tag $TAG matches prerelease pattern; publishing as prerelease."
          else
            IS_PRE=false
            MAKE_LATEST=true
            echo "Tag $TAG is a stable tag; publishing as latest release."
          fi
          if REL_ID=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id 2>/dev/null); then
            # Existing release for this tag (e.g. prior run on the same
            # tag): re-assert the desired prerelease/latest state so a
            # re-run can't leave it stuck in the wrong status.
            gh api -X PATCH "repos/$GH_REPO/releases/$REL_ID" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST >/dev/null
            echo "Release for $TAG already exists ($REL_ID); state re-asserted, uploading into it."
          else
            BODY=$'Unsigned Electron build of condash. Auto-update channel served from this release via `electron-updater`.\n\nInstall bypass per OS:\n- Windows: SmartScreen → "More info" → "Run anyway".\n- macOS: System Settings → Privacy & Security → "Open Anyway".\n- Linux: `chmod +x` the AppImage, run.'
            gh api -X POST "repos/$GH_REPO/releases" \
              -f tag_name="$TAG" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST \
              -f name="condash $TAG" \
              -f body="$BODY" \
              --jq '"Created release " + (.id|tostring) + " for " + .tag_name'
          fi

      # Single uploader, no race. `--clobber` so a re-run replaces existing
      # assets cleanly without 422'ing on duplicate filenames.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-staging/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No assets staged — nothing to upload" >&2
            exit 1
          fi
          gh release upload "$TAG" --repo "$GH_REPO" --clobber "${assets[@]}"
