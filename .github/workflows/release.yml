name: release

# Build unsigned cross-platform installers + publish them (and the
# `latest*.yml` channel files electron-updater needs) to the GitHub Release
# tied to the pushed `v*` tag.
#
# Triggered by tags only — `git push origin v2.0.0`. The workflow does NOT
# create the tag itself; humans cut the tag locally with `git tag -a vX`
# after a clean main and push it.
#
# Why the `release-init` job exists, and why it pre-creates a *prerelease*
# instead of a *draft*: when three matrix jobs hit electron-builder's
# "find or create release for this tag" path simultaneously, they each
# lose the find-or-create race and create their own release for the same
# tag — assets fragment across two or three duplicate releases (we hit
# this on v2.0.0-rc.1 and the condash-tauri v1.8.8 release). Pre-creating
# the release once would fix this — except `GET /repos/:owner/:repo/
# releases/tags/:tag` returns **404 for draft releases**, so a pre-
# created draft is invisible to electron-builder's lookup and it creates
# a duplicate anyway (we hit this on v2.0.0-rc.2). Pre-creating as a
# *prerelease* is visible to the by-tag lookup; electron-builder finds
# it and appends. Prereleases are public but excluded from
# `releases/latest`, which is electron-updater's default channel, so
# shipped users aren't auto-updated to rc bundles.

on:
  push:
    tags:
      - 'v*'

permissions:
  # contents:write is required for release-init to create the GH Release
  # and for electron-builder in each matrix job to upload assets, all via
  # the workflow's GITHUB_TOKEN.
  contents: write

jobs:
  release-init:
    name: Create prerelease
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Idempotent. `gh api -X POST` instead of `gh release create` so
      # there's no subsecond list-query lag between create + lookup. If
      # the release already exists (re-run, retry), reuse it.
      - name: Ensure prerelease exists for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            echo "Release for $TAG already exists (id=$existing); matrix jobs will append."
            exit 0
          fi
          BODY=$'Unsigned Electron build of condash. Auto-update channel served from this release via `electron-updater`.\n\nInstall bypass per OS:\n- Windows: SmartScreen → "More info" → "Run anyway".\n- macOS: System Settings → Privacy & Security → "Open Anyway".\n- Linux: `chmod +x` the AppImage, run.'
          gh api -X POST "repos/$GH_REPO/releases" \
            -f tag_name="$TAG" \
            -F draft=false \
            -F prerelease=true \
            -f name="condash $TAG" \
            -f body="$BODY" \
            --jq '"Created prerelease " + (.id|tostring) + " for " + .tag_name'

  build:
    name: Build (${{ matrix.os }})
    needs: release-init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      # electron-builder produces installers for the current OS, finds
      # the prerelease created by release-init via the by-tag lookup, and
      # appends its bundles plus the matching `latest*.yml` channel file
      # to it. With the prerelease pre-existing, no two matrix jobs race
      # to create one.
      - name: Build installers + publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder reads GH_TOKEN; set both for compatibility
          # with the older `electron-builder-publish` lookup.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
