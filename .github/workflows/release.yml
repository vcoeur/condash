name: release

# Build unsigned cross-platform installers + publish them (and the
# `latest*.yml` channel files electron-updater needs) to the GitHub Release
# tied to the pushed `v*` tag.
#
# Triggered by tags only — `git push origin v2.0.0`. The workflow does NOT
# create the tag itself; humans cut the tag locally with `git tag -a vX`
# after a clean main and push it.
#
# Why the `release-init` job exists: electron-builder calls "find or create
# release" at publish time, and when three matrix jobs hit that API
# simultaneously they each lose the find-or-create race and create their
# own draft, leaving three duplicate releases for the same tag. Pre-
# creating the draft once (idempotently) lets every matrix job's
# electron-builder find the existing draft and append to it.

on:
  push:
    tags:
      - 'v*'

permissions:
  # contents:write is required for the release-init step to create the GH
  # Release and for electron-builder in each matrix job to upload assets,
  # all via the workflow's GITHUB_TOKEN.
  contents: write

jobs:
  release-init:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Idempotent: if the draft already exists (re-run, retry), reuse it.
      # `gh release create` exits non-zero on existing tag, so check first.
      - name: Ensure draft release exists for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists; matrix jobs will upload into it."
          else
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --draft \
              --title "$tag" \
              --notes "Automated release for $tag. Bundles attached by the matrix jobs below."
            echo "Created draft release $tag."
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: release-init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      # electron-builder produces installers for the current OS, finds the
      # draft release release-init pre-created, and appends its bundles
      # plus the matching `latest*.yml` channel file to it. With the draft
      # pre-existing, no two matrix jobs race to create one.
      - name: Build installers + publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder reads GH_TOKEN; set both for compatibility with
          # the older `electron-builder-publish` lookup.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
