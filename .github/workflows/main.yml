name: main

# Heavy CI on every push to main and every `v*` tag, with publish
# gated by `needs:` chains — no out-of-band API queries.
#
# Shape:
#
#                          ┌── fast ─────────┐
#                          │                 │
#   on push: main          ├── playwright ───┼── build (matrix) ──┐
#   on push: tags v*       │                 │                    │
#                          └── validate-tag ─┴─────────────────── publish
#                              (tag push only)              (tag push only)
#
# Push to main: fast + playwright + build run. validate-tag and
# publish are skipped (no tag ref). The 3-OS installer matrix
# uploads workflow artefacts that are then discarded (retention=1d).
#
# Tag push: same heavy CI plus validate-tag and publish. publish
# `needs: [validate-tag, build]` — if anything before it failed,
# `needs:` itself blocks the job from starting. No GH Release is
# created and no assets uploaded.
#
# Why heavy CI runs twice per release (once on the merge to main,
# once on the tag against the same SHA): keeping the gate as a pure
# `needs:` chain inside one workflow is the cheapest possible
# guarantee that "publish only if green for this SHA" — no commit-
# status lookups, no workflow_run plumbing carrying state between
# workflows. The duplicate run is ~7 minutes of GHA time per release.
#
# Why one combined workflow rather than main-then-release via
# workflow_run: artefact handoff across workflow_run boundaries is
# possible but fragile, and the `needs:` form leaves the publish
# job's gate visible in one file.
#
# Recovery on tag-time failure: fix on a follow-up commit, bump,
# re-tag against the new SHA, re-push. The tag itself stays in git
# but nothing public ships.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  # publish needs contents:write to create the GH Release and upload
  # assets via the workflow's GITHUB_TOKEN.
  contents: write

jobs:
  fast:
    name: Fast checks (typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache node_modules + the electron/electron-builder caches. On a
      # hit we skip npm ci entirely — the `electron-rebuild` postinstall
      # output for node-pty is part of node_modules and is restored too,
      # so we don't pay the ~20-40 s native rebuild on warm runs.
      - name: Cache node_modules + electron caches
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
          key: deps-ubuntu-${{ hashFiles('package-lock.json') }}-electron-33

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Format check
        run: make format-check

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build

      - name: Vitest unit suite
        run: npx vitest run

  playwright:
    name: Playwright suite
    runs-on: ubuntu-latest
    # The suite takes ~1-2 min locally; CI runners are slower and need
    # generous headroom for the screenshots spec (~20 s) and Electron's
    # first cold start.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules + electron caches
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
          key: deps-ubuntu-${{ hashFiles('package-lock.json') }}-electron-33

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install xvfb
        # Electron Playwright needs a display server on Linux. xvfb-run -a
        # wraps the suite so each invocation gets an isolated virtual
        # display.
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build renderer + main
        run: npm run build

      - name: Run Playwright suite
        run: xvfb-run -a npm test -- --reporter=list

      - name: Upload Playwright artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artefacts
          path: |
            test-results/
            tests/screenshots-out/
          if-no-files-found: ignore

  validate-tag:
    name: Validate tag (shape + version + reachable from main)
    # Only runs for `v*` tag pushes — never on commits to main.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for ancestry check)
        uses: actions/checkout@v4
        with:
          # Need enough history to run `git merge-base --is-ancestor`
          # against origin/main. Shallow clones miss the ancestry.
          fetch-depth: 0

      # Reject malformed tags before any matrix job spins up. The release
      # path only handles stable `vX.Y.Z` tags and prerelease suffixes
      # (`-rc.N`, `-alpha*`, `-beta*`); they all need the leading semver
      # triplet to match. Catches typos like `v3.12..1` or `v3.12`.
      - name: Validate tag shape
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid vX.Y.Z[-suffix] release tag." >&2
            exit 1
          fi
          echo "Tag $TAG is valid."

      # Assert that package.json's version matches the tag (sans leading
      # `v`). Catches "forgot to bump" — the bump commit must land on
      # main before the tag is pushed, per the conception release rule.
      - name: Assert package.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${TAG#v}"
          if [[ "$PKG_VERSION" != "$EXPECTED" ]]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($EXPECTED)." >&2
            echo "Bump package.json before pushing the tag." >&2
            exit 1
          fi
          echo "package.json version $PKG_VERSION matches tag $TAG."

      # Refuse to release a tag that isn't reachable from origin/main.
      # This enforces "tags ship code that has landed in main" — no
      # one-off feature-branch tags, no detached commits.
      - name: Assert tag SHA is reachable from origin/main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          TAG_SHA=$(git rev-parse "$TAG^{commit}")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag $TAG ($TAG_SHA) is not reachable from origin/main." >&2
            echo "Tags must point at commits that have landed on main." >&2
            exit 1
          fi
          echo "Tag $TAG ($TAG_SHA) is reachable from origin/main."

  build:
    name: Build (${{ matrix.os }})
    # The installer matrix gates publish via `needs:`. On a main push the
    # build still runs (validates that the merged SHA produces installers
    # cleanly on all three OSes), but its artefacts are dropped after a
    # day. On a tag push the same artefacts feed publish.
    needs: [fast, playwright]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      # `--publish never` builds the installers and emits the matching
      # `latest*.yml` channel file under `release/` without touching the
      # GH Release API. Upload happens in the `publish` job below.
      - name: Build installers
        run: npx electron-builder --publish never

      # Patch the AppImage's AppRun launcher to exec Electron with
      # `--no-sandbox`. Without this the AppImage aborts on launch with
      # "SUID sandbox helper binary was found, but is not configured
      # correctly" because AppImage extracts to /tmp/.mount_*/, which
      # most distros mount `nosuid` — so chrome-sandbox loses its SUID
      # bit. `app.commandLine.appendSwitch('no-sandbox')` from main.ts
      # was tried first and verified to ship in the asar, but Chromium
      # reads its sandbox config too early in init for the JS-level
      # switch to take effect. The .deb path keeps the sandbox: it
      # installs chrome-sandbox at /opt/condash/ where the SUID bit is
      # honoured, so this patch only touches the AppImage.
      # appimagetool 1.9.0 calls `desktop-file-validate` on the bundle
      # contents during repack and aborts if it's missing. Not on the
      # default ubuntu-latest image.
      - name: Install desktop-file-utils (for appimagetool repack)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils

      - name: Inject --no-sandbox into AppImage AppRun
        if: matrix.os == 'ubuntu-latest'
        env:
          # Pinned appimagetool release — moving off `continuous` so a
          # silent upstream change doesn't break release day.
          APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=(release/condash-*.AppImage)
          shopt -u nullglob
          if [[ ${#matches[@]} -eq 0 ]]; then
            echo "No AppImage found to patch" >&2
            exit 1
          fi
          APPIMAGE="${matches[0]}"
          echo "Patching $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/original.AppImage"
          chmod +x "$WORK/original.AppImage"
          ( cd "$WORK" && ./original.AppImage --appimage-extract >/dev/null )

          # Rewrite the two `exec "$BIN" …` lines in AppRun's atexit
          # function to insert --no-sandbox before forwarded args.
          # Using a Python rewrite (rather than sed) so the substitution
          # is exact and can be re-asserted in the verify step below.
          # Lines are indented 6 spaces in electron-builder's stock
          # AppRun template; the literal whitespace must match.
          python3 - "$WORK/squashfs-root/AppRun" <<'PY'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          src = p.read_text()
          replacements = [
              ('      exec "$BIN"\n',              '      exec "$BIN" --no-sandbox\n'),
              ('      exec "$BIN" "${args[@]}"\n', '      exec "$BIN" --no-sandbox "${args[@]}"\n'),
          ]
          for old, new in replacements:
              if old not in src:
                  raise SystemExit(f"AppRun does not contain expected line: {old!r}")
              src = src.replace(old, new)
          p.write_text(src)
          print("AppRun patched.")
          PY

          # Repack with a pinned appimagetool release. Run it via
          # --appimage-extract-and-run so the runner doesn't need
          # fuse / libfuse2.
          curl -sSL -o "$WORK/appimagetool" "$APPIMAGETOOL_URL"
          chmod +x "$WORK/appimagetool"
          ARCH=x86_64 "$WORK/appimagetool" --appimage-extract-and-run \
              "$WORK/squashfs-root" "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Verify: extract the repacked AppImage and confirm AppRun
          # exec lines now carry --no-sandbox.
          VERIFY=$(mktemp -d)
          cp "$APPIMAGE" "$VERIFY/out.AppImage"
          chmod +x "$VERIFY/out.AppImage"
          ( cd "$VERIFY" && ./out.AppImage --appimage-extract >/dev/null )
          if ! grep -q 'exec "\$BIN" --no-sandbox' "$VERIFY/squashfs-root/AppRun"; then
              echo "Patch verification failed — repacked AppRun missing --no-sandbox" >&2
              exit 1
          fi
          echo "AppImage AppRun patch verified."

      # Capture only the installer bundles + channel files. `if-no-files-found:
      # error` so an empty release dir fails the matrix job loudly instead of
      # silently producing an empty publish.
      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to GitHub Release
    # Only on tag push, and only if validate-tag + build (and thus
    # fast + playwright by transitive `needs:` chain) all succeeded.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-staging
          # Without merge-multiple, each matrix's artifact lands under
          # release-staging/installers-<os>/. With it, they all merge
          # into release-staging/. We use merge-multiple so the upload
          # glob is one flat directory.
          merge-multiple: true

      - name: List staged release files
        run: ls -la release-staging/

      - name: Create or reuse release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Tag-driven prerelease decision: `vX.Y.Z-rc.N`, `-alpha*`, and
          # `-beta*` ship as GitHub prereleases (not surfaced as `latest`
          # by the API). Plain `vX.Y.Z` ships as a stable release marked
          # latest, so docs sites + clients calling /releases/latest see
          # it immediately.
          if [[ "$TAG" == *-rc.* || "$TAG" == *-alpha* || "$TAG" == *-beta* ]]; then
            IS_PRE=true
            MAKE_LATEST=false
            echo "Tag $TAG matches prerelease pattern; publishing as prerelease."
          else
            IS_PRE=false
            MAKE_LATEST=true
            echo "Tag $TAG is a stable tag; publishing as latest release."
          fi
          if REL_ID=$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id 2>/dev/null); then
            # Existing release for this tag (e.g. prior run on the same
            # tag): re-assert the desired prerelease/latest state so a
            # re-run can't leave it stuck in the wrong status.
            gh api -X PATCH "repos/$GH_REPO/releases/$REL_ID" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST >/dev/null
            echo "Release for $TAG already exists ($REL_ID); state re-asserted, uploading into it."
          else
            BODY=$'Unsigned Electron build of condash.\n\nInstall bypass per OS:\n- Windows: SmartScreen → "More info" → "Run anyway".\n- macOS: System Settings → Privacy & Security → "Open Anyway".\n- Linux: `chmod +x` the AppImage, run.'
            gh api -X POST "repos/$GH_REPO/releases" \
              -f tag_name="$TAG" \
              -F draft=false \
              -F prerelease=$IS_PRE \
              -f make_latest=$MAKE_LATEST \
              -f name="condash $TAG" \
              -f body="$BODY" \
              --jq '"Created release " + (.id|tostring) + " for " + .tag_name'
          fi

      # Single uploader, no race. `--clobber` so a re-run replaces existing
      # assets cleanly without 422'ing on duplicate filenames.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-staging/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No assets staged — nothing to upload" >&2
            exit 1
          fi
          gh release upload "$TAG" --repo "$GH_REPO" --clobber "${assets[@]}"
