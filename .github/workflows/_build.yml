name: _build

# Reusable 3-OS installer matrix. Builds with `electron-builder --publish
# never` and uploads each OS's installers as a workflow artifact
# (installers-<os>, retention 1 day). Called only by release.yml (third
# stage of the real gate at tag time, where the publish job downloads the
# artefacts and uploads them to the Release).
#
# This is the single source of truth for the gnarly AppImage AppRun patch —
# keep it here, not duplicated across callers.

on:
  workflow_call:
  # Manual smoke-test: build the 3-OS matrix from any ref without tagging.
  # Nothing publishes — artifacts only (the GH Release upload lives in
  # release.yml). Added 2026-06-10 to validate the VS2026 runner-image fix.
  workflow_dispatch:

# Least privilege: the matrix builds installers and uploads them as workflow
# artifacts (runtime token — no contents writes). The GH Release upload that
# needs contents:write lives in release.yml's publish job, not here.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # windows-latest resolves to the windows-2025-vs2026 image (VS 2026
          # only, no VS 2022). That needs node-gyp >= 12.1 — provided by
          # @electron/rebuild 4 (postinstall) and npmRebuild:false in
          # electron-builder.yml (its bundled rebuild 3.6.1 cannot detect
          # VS 2026; killed the v4.38.0/v4.38.1 release builds).
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # No `cache: 'npm'` here. Its cache *save* runs as a post-step, and a
      # transient GHA cache-service timeout there exits the build job non-zero —
      # which on a release tag skips `publish` and ships nothing (hit v4.19.0 on
      # the windows-latest leg). This matrix runs only on tags, so a cold
      # `npm ci` download costs little; a reliable publish matters far more.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          # 22+: @electron/rebuild 4 declares engines.node >=22.12.
          node-version: '22'

      - name: Install dependencies
        # `npm ci` on the windows-latest runner intermittently dies with an
        # EEXIST/EPERM race in the shared npm cacache (a rename into
        # `_cacache\content-v2` collides while antivirus still holds the temp
        # file) — it killed the v4.55.0 release's windows leg, skipping publish.
        # Retry up to 3x, wiping the npm cache + node_modules between tries so a
        # half-written cacache entry can't poison the retry. `shell: bash` runs
        # on all three runner OSes (Git Bash on Windows); a genuine lockfile
        # error still fails every attempt and exits non-zero.
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt)"
            if npm ci; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "npm ci failed on attempt $attempt; clearing caches before retry" >&2
            npm cache clean --force || true
            rm -rf node_modules || true
            [ "$attempt" -lt 3 ] && sleep 10
          done
          echo "npm ci failed after 3 attempts" >&2
          exit 1

      # Tag-derived version: the git tag is the source of truth, not a committed
      # bump. `_build.yml` runs only from release.yml (tag push), so ref_name is
      # the tag. electron-builder reads this version into installers + latest*.yml.
      - name: Set version from tag
        # shell: bash so the ${VAR#v} stripping works on Windows too (default
        # shell there is PowerShell, which doesn't do bash parameter expansion).
        run: npm pkg set version="${GITHUB_REF_NAME#v}"
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build renderer + main
        run: npm run build

      # `--publish never` builds the installers and emits the matching
      # `latest*.yml` channel file under `release/` without touching the
      # GH Release API. Upload happens in release.yml's publish job.
      - name: Build installers
        run: npx electron-builder --publish never

      # Patch the AppImage's AppRun launcher to exec Electron with
      # `--no-sandbox`. Without this the AppImage aborts on launch with
      # "SUID sandbox helper binary was found, but is not configured
      # correctly" because AppImage extracts to /tmp/.mount_*/, which
      # most distros mount `nosuid` — so chrome-sandbox loses its SUID
      # bit. `app.commandLine.appendSwitch('no-sandbox')` from main.ts
      # was tried first and verified to ship in the asar, but Chromium
      # reads its sandbox config too early in init for the JS-level
      # switch to take effect. The .deb path keeps the sandbox: it
      # installs chrome-sandbox at /opt/condash/ where the SUID bit is
      # honoured, so this patch only touches the AppImage.
      # appimagetool 1.9.0 calls `desktop-file-validate` on the bundle
      # contents during repack and aborts if it's missing. Not on the
      # default ubuntu-latest image.
      - name: Install desktop-file-utils (for appimagetool repack)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y desktop-file-utils

      - name: Inject --no-sandbox into AppImage AppRun
        if: matrix.os == 'ubuntu-latest'
        env:
          # Pinned appimagetool release — moving off `continuous` so a
          # silent upstream change doesn't break release day. The sha256 is
          # the checksum of that exact 1.9.0 asset, verified before the tool
          # is executed; bump both together when changing the pin.
          APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
          APPIMAGETOOL_SHA256: 46fdd785094c7f6e545b61afcfb0f3d98d8eab243f644b4b17698c01d06083d1
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=(release/condash-*.AppImage)
          shopt -u nullglob
          if [[ ${#matches[@]} -eq 0 ]]; then
            echo "No AppImage found to patch" >&2
            exit 1
          fi
          APPIMAGE="${matches[0]}"
          echo "Patching $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/original.AppImage"
          chmod +x "$WORK/original.AppImage"
          ( cd "$WORK" && ./original.AppImage --appimage-extract >/dev/null )

          # Rewrite the two `exec "$BIN" …` lines in AppRun's atexit
          # function to insert --no-sandbox before forwarded args.
          # Using a Python rewrite (rather than sed) so the substitution
          # is exact and can be re-asserted in the verify step below.
          # Lines are indented 6 spaces in electron-builder's stock
          # AppRun template; the literal whitespace must match.
          python3 - "$WORK/squashfs-root/AppRun" <<'PY'
          import sys, pathlib
          p = pathlib.Path(sys.argv[1])
          src = p.read_text()
          replacements = [
              ('      exec "$BIN"\n',              '      exec "$BIN" --no-sandbox\n'),
              ('      exec "$BIN" "${args[@]}"\n', '      exec "$BIN" --no-sandbox "${args[@]}"\n'),
          ]
          for old, new in replacements:
              if old not in src:
                  raise SystemExit(f"AppRun does not contain expected line: {old!r}")
              src = src.replace(old, new)
          p.write_text(src)
          print("AppRun patched.")
          PY

          # Repack with a pinned appimagetool release. Run it via
          # --appimage-extract-and-run so the runner doesn't need
          # fuse / libfuse2. Verify the download against the pinned
          # checksum BEFORE executing it — a compromised or swapped
          # release asset must fail the build, not run at release time.
          curl -sSL -o "$WORK/appimagetool" "$APPIMAGETOOL_URL"
          echo "$APPIMAGETOOL_SHA256  $WORK/appimagetool" | sha256sum -c
          chmod +x "$WORK/appimagetool"
          ARCH=x86_64 "$WORK/appimagetool" --appimage-extract-and-run \
              "$WORK/squashfs-root" "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Verify: extract the repacked AppImage and confirm AppRun
          # exec lines now carry --no-sandbox.
          VERIFY=$(mktemp -d)
          cp "$APPIMAGE" "$VERIFY/out.AppImage"
          chmod +x "$VERIFY/out.AppImage"
          ( cd "$VERIFY" && ./out.AppImage --appimage-extract >/dev/null )
          if ! grep -q 'exec "\$BIN" --no-sandbox' "$VERIFY/squashfs-root/AppRun"; then
              echo "Patch verification failed — repacked AppRun missing --no-sandbox" >&2
              exit 1
          fi
          echo "AppImage AppRun patch verified."

      # Capture only the installer bundles + channel files. `if-no-files-found:
      # error` so an empty release dir fails the matrix job loudly instead of
      # silently producing an empty publish.
      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 1
