name: Pages (docs + apt repo)

# Builds the public site at condash.vcoeur.com:
#   - mkdocs site at the root
#   - Debian apt repository under /apt/
#
# Trigger: a GitHub Release is published by release.yml on tag push,
# or manual dispatch. release.yml ships plain `vX.Y.Z` as a stable
# release and `vX.Y.Z-rc.N` / `-alpha*` / `-beta*` as a prerelease.
# Both kinds carry .deb assets, so the apt scan below includes
# prereleases (and skips drafts, whose assets aren't reachable via
# gh release download).
#
# release.yml fires only on `v*` tag push, so every completed run is a
# publish. The build job below still guards on head_branch starting with
# 'v' as belt-and-braces, so a stray non-tag run (or a future trigger
# change) can never rebuild the apt repo off a non-release commit.
#
# The apt repo is rebuilt deterministically from scratch on every
# run, but the .deb assets it ingests are cached across runs (keyed
# on the fingerprint of the visible release-tag set). On a release-
# tag change the key misses and the parallel download loop re-fetches
# only the missing assets onto the prior cache. A corrupted Pages
# deploy can still be recovered by manually evicting the cache and
# re-running the workflow.
#
# Apt history is capped to the most-recent N releases (APT_HISTORY).
# Older versions remain installable via direct .deb download from
# the GitHub Releases page; only the apt index is trimmed.

on:
  # `workflow_run` instead of `release: [published]` because release.yml
  # creates the prerelease via the workflow's own GITHUB_TOKEN — and
  # release events fired by GITHUB_TOKEN do NOT cascade into other
  # workflows (documented GitHub anti-loop rule). workflow_run is the
  # one trigger that DOES cascade across that boundary, and it lets us
  # gate on release.yml succeeding so we never publish apt metadata for
  # a release that didn't finish uploading its .debs.
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Cancel a still-pending pages deploy when a newer run supersedes it. The apt
  # index + mkdocs site are rebuilt deterministically from scratch every run, so
  # the latest run always wins; a stale queued/in-progress run must not block or
  # clobber it. (Previously false, which let a wedged run jam the whole group.)
  cancel-in-progress: true

env:
  APT_SIGNING_KEY_FPR: BC6C98E8D6D80FFBC408057FD1D69E3E4A005621
  APT_SUITE: stable
  APT_COMPONENT: main
  APT_HISTORY: 5

jobs:
  build:
    runs-on: ubuntu-latest
    # Two filters on workflow_run triggers:
    #   1. release.yml must have succeeded — we never rebuild the apt repo
    #      against a half-published release.
    #   2. The upstream run's head_branch must start with 'v'. release.yml
    #      now fires only on `v*` tags, so head_branch is always the tag
    #      name 'vX.Y.Z'; this guard is belt-and-braces against a future
    #      trigger change ever feeding a non-release commit into the build.
    # workflow_dispatch fires without a workflow_run context (so both
    # checks evaluate against null/empty values) — we accept that case
    # explicitly for manual rebuilds.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # No uv.lock in this repo (we use ephemeral `uv run --with`).
          # Key the cache on the workflow file itself, where the
          # mkdocs-material pin lives — invalidates only on bump.
          cache-dependency-glob: .github/workflows/docs.yml

      - name: Install aptly + gnupg
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build mkdocs site
        run: uv run --with "mkdocs-material==9.5.49" mkdocs build --strict

      - name: Import apt signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
          gpg --list-secret-keys "$APT_SIGNING_KEY_FPR" >/dev/null

      - name: Resolve release-tag window
        id: tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Most-recent N non-draft releases (newest first per gh's
          # default sort). Prereleases are included — release.yml ships
          # Electron builds as prereleases on tag push.
          gh release list --limit "$APT_HISTORY" --json tagName,isDraft \
            -q '.[] | select(.isDraft==false) | .tagName' > .release-tags.txt
          echo "Tag window:"
          cat .release-tags.txt
          fingerprint="$(sort .release-tags.txt | sha256sum | cut -c1-16)"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Cache .deb assets
        uses: actions/cache@v5
        with:
          path: debs
          key: condash-debs-v1-${{ steps.tags.outputs.fingerprint }}
          restore-keys: |
            condash-debs-v1-

      - name: Fetch .deb assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p debs
          while IFS= read -r tag; do
            assets_json=$(curl -fsSL --retry 3 --retry-delay 1 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GH_REPO/releases/tags/$tag")
            echo "$assets_json" | jq -r '.assets[] | select(.name | endswith(".deb")) | [.name, .url] | @tsv' | while IFS=$'\t' read -r name url; do
              [ -n "$name" ] || continue
              if [ -f "debs/$name" ]; then
                echo "Skipping existing debs/$name"
                continue
              fi
              echo "Downloading debs/$name ..."
              curl -fsSL --retry 3 --retry-delay 1 \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/octet-stream" \
                "$url" -o "debs/$name"
            done
          done < .release-tags.txt

      - name: Prune .debs outside the release window
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Restore-key cache hits can carry .debs from a previous tag
          # window. Compute the expected filename set from the current
          # window and drop anything else, so the apt repo only indexes
          # APT_HISTORY releases.
          : > .expected-debs.txt
          while IFS= read -r tag; do
            curl -fsSL --retry 3 --retry-delay 1 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GH_REPO/releases/tags/$tag" \
              | jq -r '.assets[] | select(.name | endswith(".deb")) | .name' >> .expected-debs.txt
          done < .release-tags.txt
          sort -u .expected-debs.txt -o .expected-debs.txt
          find debs -maxdepth 1 -name '*.deb' -printf '%f\n' \
            | sort -u > .have-debs.txt
          comm -23 .have-debs.txt .expected-debs.txt > .stale-debs.txt
          if [ -s .stale-debs.txt ]; then
            echo "Pruning stale .debs:"
            cat .stale-debs.txt
            while IFS= read -r f; do rm -f "debs/$f"; done < .stale-debs.txt
          fi
          ls -la debs/

      - name: Build apt repo with aptly
        run: |
          set -euo pipefail
          # Fresh aptly DB each run — fully deterministic.
          rm -rf ~/.aptly
          aptly repo create -distribution="$APT_SUITE" -component="$APT_COMPONENT" condash
          if compgen -G "debs/*.deb" >/dev/null; then
            aptly repo add condash debs/
          else
            echo "No .deb files found — publishing empty repo." >&2
          fi
          SNAPSHOT="release-$(date -u +%Y%m%d%H%M%S)"
          aptly snapshot create "$SNAPSHOT" from repo condash
          aptly publish snapshot \
            -batch \
            -gpg-key="$APT_SIGNING_KEY_FPR" \
            -distribution="$APT_SUITE" \
            "$SNAPSHOT" condash

      - name: Assemble apt subtree into site/
        run: |
          set -euo pipefail
          mkdir -p site/apt
          # aptly publishes to ~/.aptly/public/<prefix>/ — we used
          # prefix "condash", so its output is the apt root.
          cp -r ~/.aptly/public/condash/. site/apt/
          # Export the public key alongside the metadata so users can
          # fetch it directly. Single source of truth: the GPG keyring
          # we just imported, not a committed file.
          gpg --armor --export "$APT_SIGNING_KEY_FPR" > site/apt/pubkey.asc
          ls -la site/apt/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
