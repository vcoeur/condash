name: Pages (docs + apt repo)

# Builds the public site at condash.vcoeur.com:
#   - mkdocs site at the root
#   - Debian apt repository under /apt/
#
# Trigger: a GitHub Release is published by release.yml on tag push,
# or manual dispatch. release.yml ships plain `vX.Y.Z` as a stable
# release and `vX.Y.Z-rc.N` / `-alpha*` / `-beta*` as a prerelease.
# Both kinds carry .deb assets, so the apt scan below includes
# prereleases (and skips drafts, whose assets aren't reachable via
# gh release download).
#
# The apt repo is rebuilt deterministically from scratch on every
# run by re-fetching every .deb from every published GitHub
# Release — no state is preserved between deploys, so a corrupted
# Pages deploy can be recovered by re-running the workflow.

on:
  # `workflow_run` instead of `release: [published]` because release.yml
  # creates the prerelease via the workflow's own GITHUB_TOKEN — and
  # release events fired by GITHUB_TOKEN do NOT cascade into other
  # workflows (documented GitHub anti-loop rule). workflow_run is the
  # one trigger that DOES cascade across that boundary, and it lets us
  # gate on release.yml succeeding so we never publish apt metadata for
  # a release that didn't finish uploading its .debs.
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  APT_SIGNING_KEY_FPR: BC6C98E8D6D80FFBC408057FD1D69E3E4A005621
  APT_SUITE: stable
  APT_COMPONENT: main

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip when the upstream release run failed. workflow_dispatch fires
    # without a workflow_run context, so the conclusion check evaluates
    # to '' — we accept that case too.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install aptly + gnupg
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build mkdocs site
        run: uv run --with "mkdocs-material==9.5.49" mkdocs build --strict

      - name: Import apt signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
          gpg --list-secret-keys "$APT_SIGNING_KEY_FPR" >/dev/null

      - name: Download all .deb from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p debs
          # Iterate every release tag and pull its .deb assets.
          # Drafts are skipped (assets aren't reachable via
          # gh release download); prereleases ARE included because
          # the Electron release.yml ships builds as prereleases on
          # tag push (see release.yml header comment for the why).
          for tag in $(gh release list --limit 200 --json tagName,isDraft \
                       -q '.[] | select(.isDraft==false) | .tagName'); do
            echo "Fetching .deb assets from $tag"
            gh release download "$tag" --pattern '*.deb' --dir debs/ --skip-existing || true
          done
          ls -la debs/

      - name: Build apt repo with aptly
        run: |
          set -euo pipefail
          # Fresh aptly DB each run — fully deterministic.
          rm -rf ~/.aptly
          aptly repo create -distribution="$APT_SUITE" -component="$APT_COMPONENT" condash
          if compgen -G "debs/*.deb" >/dev/null; then
            aptly repo add condash debs/
          else
            echo "No .deb files found — publishing empty repo." >&2
          fi
          SNAPSHOT="release-$(date -u +%Y%m%d%H%M%S)"
          aptly snapshot create "$SNAPSHOT" from repo condash
          aptly publish snapshot \
            -batch \
            -gpg-key="$APT_SIGNING_KEY_FPR" \
            -distribution="$APT_SUITE" \
            "$SNAPSHOT" condash

      - name: Assemble apt subtree into site/
        run: |
          set -euo pipefail
          mkdir -p site/apt
          # aptly publishes to ~/.aptly/public/<prefix>/ — we used
          # prefix "condash", so its output is the apt root.
          cp -r ~/.aptly/public/condash/. site/apt/
          # Export the public key alongside the metadata so users can
          # fetch it directly. Single source of truth: the GPG keyring
          # we just imported, not a committed file.
          gpg --armor --export "$APT_SIGNING_KEY_FPR" > site/apt/pubkey.asc
          ls -la site/apt/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
