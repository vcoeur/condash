name: ci

# Light gate on every PR (including drafts) and every push to main.
# Runs format-check + typecheck + build + vitest, target <= 90 s.
#
# Path filtering is done at the JOB level (via the `changes` job), not with
# a workflow-level `paths-ignore`. That's deliberate: a required status check
# whose workflow never triggers (filtered out) is stuck "Expected" forever
# and blocks the PR. By always triggering and skipping the work instead, the
# `ci-light-gate` check always reports -- so branch protection can require it
# without wedging docs-only PRs.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: f
        name: Detect non-docs changes
        run: |
          set -euo pipefail
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            base='${{ github.event.pull_request.base.sha }}'
          else
            base='${{ github.event.before }}'
          fi
          # code = any changed file outside docs/, assets/, or *.md.
          if git diff --name-only "$base" HEAD | grep -qEv '^(docs/|assets/)|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected -- fast lane will run."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs/assets-only change -- fast lane skipped (gate still reports)."
          fi

  fast:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_fast.yml

  ci-light-gate:
    # The single required check for this workflow. Always runs so it always
    # reports; passes when `fast` succeeded or was skipped (docs-only), fails
    # when it failed/was cancelled. Require THIS in branch protection, not the
    # inner `fast / ...` check (which doesn't report on a skipped docs-only PR).
    name: ci-light-gate
    needs: [changes, fast]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require fast lane green or skipped
        run: |
          set -euo pipefail
          changes='${{ needs.changes.result }}'
          fast='${{ needs.fast.result }}'
          if [[ "$changes" != "success" ]]; then
            echo "changes job did not succeed ($changes)." >&2
            exit 1
          fi
          if [[ "$fast" == "failure" || "$fast" == "cancelled" ]]; then
            echo "fast lane failed ($fast)." >&2
            exit 1
          fi
          echo "ci-light-gate ok (fast=$fast)."
